<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111119"/>
      <stop offset="0.55" stop-color="#0B0B10"/>
      <stop offset="1" stop-color="#08080A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#6E60D9" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#6E60D9" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#6E60D9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rootGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#E0CC58" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#E0CC58" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <rect width="1024" height="500" fill="url(#bg)"/>
  <ellipse cx="740" cy="250" rx="440" ry="360" fill="url(#glow)"/>

  <!-- ===== Left: wordmark + tagline ===== -->
  <text x="66" y="150" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="bold" letter-spacing="4.5" fill="#E0CC58">BASS FRETBOARD TRAINER</text>

  <text x="62" y="238" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="bold" fill="#F2F1EC" letter-spacing="-1">Fretionary</text>
  <text x="62" y="320" font-family="Arial, Helvetica, sans-serif" font-size="78" font-weight="bold" fill="#E0CC58" letter-spacing="-1">Bass</text>

  <rect x="66" y="344" width="118" height="5" rx="2.5" fill="#6E60D9"/>

  <text x="66" y="396" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="500" fill="#C9C8C3">Scales, chord tones &amp; progressions —</text>
  <text x="66" y="428" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="500" fill="#9A9995">see the theory as you play it.</text>

  <!-- ===== Right: fretboard panel ===== -->
  <rect x="524" y="86" width="468" height="328" rx="22" fill="#14141A" stroke="rgba(255,255,255,0.09)" stroke-width="1.5"/>

  <!-- inlays -->
  <circle cx="722" cy="235" r="7" fill="rgba(255,255,255,0.05)"/>
  <circle cx="852" cy="235" r="7" fill="rgba(255,255,255,0.05)"/>

  <!-- frets -->
  <g stroke="rgba(255,255,255,0.10)" stroke-width="2">
    <line x1="625" y1="140" x2="625" y2="330"/>
    <line x1="690" y1="140" x2="690" y2="330"/>
    <line x1="755" y1="140" x2="755" y2="330"/>
    <line x1="820" y1="140" x2="820" y2="330"/>
    <line x1="885" y1="140" x2="885" y2="330"/>
    <line x1="950" y1="140" x2="950" y2="330"/>
  </g>
  <!-- nut -->
  <rect x="557" y="138" width="6" height="194" rx="2" fill="#D9D6CC"/>

  <!-- strings -->
  <g stroke="rgba(242,241,236,0.5)" stroke-width="1.4">
    <line x1="560" y1="140" x2="950" y2="140"/>
    <line x1="560" y1="203" x2="950" y2="203"/>
    <line x1="560" y1="267" x2="950" y2="267"/>
    <line x1="560" y1="330" x2="950" y2="330"/>
  </g>

  <!-- scale-tone underlay dots -->
  <g>
    <circle cx="592" cy="140" r="15" fill="#3F3F47" stroke="#666670" stroke-width="1"/>
    <circle cx="592" cy="267" r="15" fill="#3F3F47" stroke="#666670" stroke-width="1"/>
    <circle cx="722" cy="330" r="15" fill="#3F3F47" stroke="#666670" stroke-width="1"/>
    <circle cx="852" cy="330" r="15" fill="#3F3F47" stroke="#666670" stroke-width="1"/>
    <circle cx="917" cy="140" r="15" fill="#3F3F47" stroke="#666670" stroke-width="1"/>
  </g>

  <!-- chord-tone dots (R / 3 / 5 / 7) -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">
    <!-- root glows -->
    <circle cx="657" cy="267" r="30" fill="url(#rootGlow)"/>
    <circle cx="787" cy="140" r="30" fill="url(#rootGlow)"/>

    <circle cx="657" cy="267" r="21" fill="#E0CC58" stroke="#B49E2E" stroke-width="1.5"/>
    <text x="657" y="273" fill="#3E3208">R</text>

    <circle cx="787" cy="140" r="21" fill="#E0CC58" stroke="#B49E2E" stroke-width="1.5"/>
    <text x="787" y="146" fill="#3E3208">R</text>

    <circle cx="722" cy="203" r="21" fill="#D45846" stroke="#9B3A2D" stroke-width="1.5"/>
    <text x="722" y="209" fill="#ffffff">3</text>

    <circle cx="592" cy="330" r="21" fill="#3FA08A" stroke="#26786A" stroke-width="1.5"/>
    <text x="592" y="336" fill="#ffffff">5</text>

    <circle cx="852" cy="203" r="21" fill="#3FA08A" stroke="#26786A" stroke-width="1.5"/>
    <text x="852" y="209" fill="#ffffff">5</text>

    <circle cx="852" cy="267" r="21" fill="#5C8FCC" stroke="#3D6BA0" stroke-width="1.5"/>
    <text x="852" y="273" fill="#ffffff">7</text>
  </g>

  <!-- progression strip -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">
    <path d="M 566 364 L 566 388 L 584 376 Z" fill="#6E60D9"/>
    <rect x="596" y="360" width="60" height="32" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)"/>
    <text x="626" y="382" fill="#C9C8C3">Dm</text>
    <rect x="666" y="360" width="52" height="32" rx="16" fill="rgba(110,96,217,0.18)" stroke="#6E60D9" stroke-width="1.5"/>
    <text x="692" y="382" fill="#F2F1EC">G</text>
    <rect x="728" y="360" width="52" height="32" rx="16" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)"/>
    <text x="754" y="382" fill="#C9C8C3">C</text>
  </g>
</svg>

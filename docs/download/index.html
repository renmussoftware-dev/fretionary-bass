<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fretionary — Download</title>
  <!--
    Device-aware redirect:
      Android  → Google Play
      iOS      → App Store
      Desktop / unknown → show both store buttons (no auto-redirect)
    Runs before paint so mobile ad traffic lands on the right store instantly.
  -->
  <script>
    (function () {
      var APP_STORE = "https://apps.apple.com/us/app/fretionary/id6761344883";
      var PLAY_STORE = "https://play.google.com/store/apps/details?id=com.renmussoftware.nodi";
      var ua = navigator.userAgent || navigator.vendor || "";
      if (/android/i.test(ua)) {
        window.location.replace(PLAY_STORE);
      } else if (/iphone|ipad|ipod/i.test(ua) && !window.MSStream) {
        window.location.replace(APP_STORE);
      }
      // Desktop / unrecognized: fall through to the landing page below.
    })();
  </script>
  <style>
    :root { --gold: #e8d44d; }
    body { background: #0a0a0b; color: #f0ede8; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 24px; box-sizing: border-box; }
    .wrap { text-align: center; max-width: 420px; }
    h1 { font-size: 26px; margin: 0 0 8px; font-weight: 700; }
    p { color: #b8b4ac; font-size: 15px; line-height: 1.5; margin: 0 0 28px; }
    .stores { display: flex; flex-direction: column; gap: 12px; align-items: stretch; }
    .store-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: var(--gold); color: #1a1400; font-size: 16px; font-weight: 600;
      padding: 15px 28px; border-radius: 100px; text-decoration: none; transition: opacity 0.2s, transform 0.2s;
    }
    .store-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .store-btn svg { flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Get Fretionary</h1>
    <p>Choose your platform to download the app.</p>
    <div class="stores">
      <a class="store-btn" href="https://apps.apple.com/us/app/fretionary/id6761344883" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Download on the App Store
      </a>
      <a class="store-btn" href="https://play.google.com/store/apps/details?id=com.renmussoftware.nodi" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3.609 1.814L13.792 12 3.61 22.186a.996.996 0 0 1-.61-.92V2.734a1 1 0 0 1 .609-.92zm10.89 10.893l2.302 2.302-10.937 6.333 8.635-8.635zm3.199-3.198l2.807 1.626a1 1 0 0 1 0 1.73l-2.808 1.626L15.39 12l2.308-2.491zM5.864 2.658L16.802 8.99l-2.302 2.302-8.636-8.634z"/></svg>
        Get it on Google Play
      </a>
    </div>
  </div>
</body>
</html>
